<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>상식퀴즈 | 클릭해서 정답 확인</title>
  <meta name="description" content="나라 수도, 동물, 과학, 역사 등 다양한 상식퀴즈. 클릭하면 정답이 나옵니다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=6">
  <link rel="stylesheet" href="css/quiz.css?v=2">
</head>
<body>
  <div class="bg-pattern quiz-bg" aria-hidden="true"></div>

  <header class="site-header site-header-nav">
    <a href="quiz.html" class="logo">
      <span class="logo-icon">💡</span>
      <span class="logo-text">상식퀴즈</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">InsightIQ</a>
      <a href="aca.html">행렬검사</a>
      <a href="quiz.html" class="active">상식퀴즈</a>
      <a href="mbti.html">MBTI</a>
    </nav>
  </header>

  <main id="app">
    <!-- 카테고리 선택 -->
    <section id="screen-categories" class="screen active">
      <div class="card hero-card">
        <div class="hero-badge quiz-badge">클릭 퀴즈 · 22종 · 500+ 문항</div>
        <h1>상식퀴즈</h1>
        <p class="hero-desc">
          <strong>신조어·일상상식·연애 MBTI·밸런스 게임</strong>까지!
          질문을 <strong>클릭</strong>하면 정답(또는 토론 포인트)이 나옵니다.
        </p>
        <p class="hero-desc" style="font-size:0.9rem;margin-top:0.5rem;">
          예) <strong>나라 수도</strong> → 「대한민국」→「서울」 · <strong>신조어</strong> → 「분좋카」→「분위기 좋은 카페」
        </p>
        <div id="category-grid"></div>
      </div>
    </section>

    <!-- 플레이 -->
    <section id="screen-play" class="screen">
      <div class="card">
        <div class="quiz-play-header">
          <button id="btn-back" class="btn btn-ghost" type="button">← 목록</button>
          <div class="quiz-play-title">
            <span id="play-icon"></span>
            <span id="play-title"></span>
          </div>
          <span id="play-progress" class="quiz-progress-text">1 / 50</span>
        </div>

        <div class="quiz-score-bar">
          <span>학습 <strong id="stat-learned">0</strong></span>
          <span>남은 문제 <strong id="stat-remaining">0</strong></span>
        </div>

        <div class="quiz-card-area">
          <button id="quiz-card" type="button" class="quiz-flip-card" aria-live="polite">
            <span id="card-label" class="card-label">나라</span>
            <span id="card-text" class="card-text">대한민국</span>
            <span id="card-hint" class="card-hint">클릭하면 정답이 나옵니다</span>
          </button>
        </div>

        <div class="quiz-play-nav">
          <button id="btn-prev" class="btn btn-ghost" type="button">이전</button>
          <button id="btn-shuffle" class="btn btn-ghost" type="button">🔀 섞기</button>
          <button id="btn-next" class="btn btn-primary" type="button">다음</button>
        </div>
      </div>
    </section>

    <!-- 완료 -->
    <section id="screen-done" class="screen">
      <div class="card quiz-done-card">
        <h2>🎉 한 바퀴 완료!</h2>
        <p id="done-message" class="hero-desc"></p>
        <div class="quiz-done-stats">
          <div class="quiz-done-stat">
            <div class="value" id="done-total">0</div>
            <div class="label">학습 문항</div>
          </div>
        </div>
        <div class="result-actions">
          <button id="btn-replay" class="btn btn-primary">다시 하기</button>
          <button id="btn-home" class="btn btn-ghost">다른 퀴즈</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 상식퀴즈 · 클릭해서 배우는 상식 게임</p>
  </footer>

  <script src="js/shuffle.js?v=1"></script>
  <script src="js/quiz-data.js?v=2"></script>
  <script src="js/quiz-app.js?v=2"></script>
</body>
</html>
